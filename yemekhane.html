<script type="text/javascript">
    $(document).ready(function () {
        var today = new Date();
        var dd = today.getDate();
        var mm = today.getMonth() + 1; //January is 0!
        var yyyy = today.getFullYear();
        if (dd < 10) {
            dd = '0' + dd
        }

        if (mm < 10) {
            mm = '0' + mm
        }

        today = yyyy + '-' + mm + '-' + dd;
        var key_tarih = dd + '-' + mm + '-' + yyyy;

        $.post('https://yemekhane.iste.edu.tr/menuGetir', {
            "tarih": today,
            "_token": 'IStJfH02JuBRjH7t8jgKNSol6Aq7w1L54Kjva5Qb'
        }, function (data) {
            document.getElementById('tarih').innerHTML = key_tarih;
            //alert(data);
            var gelen = data + '';
            var menuler = gelen.split("<-->");
            if (menuler.length > 1) {
                var menuarray1 = JSON.parse(menuler[0]) + '';
                var menu1 = menuarray1.split(",");
                //alert(menu1);
                for (var i = 0; i < menu1.length; i++) {
                    document.getElementById('menu1_' + (i + 1)).innerHTML = menu1[i];
                }
                var menuarray2 = JSON.parse(menuler[1]) + '';
                var menu2 = menuarray2.split(",");

                for (var i = 0; i < menu2.length; i++) {
                    document.getElementById('menu2_' + (i + 1)).innerHTML = menu2[i];
                }
            } else {
                document.getElementById("menu1ID").classList.remove('menu-border-right');
                document.getElementById('menu1_head').innerHTML = '';
                for (var i = 1; i <= 7; i++) {
                    document.getElementById('menu1_' + i).innerHTML = '';
                }
                document.getElementById('menu2_head').innerHTML = '';
                for (var i = 1; i <= 7; i++) {
                    document.getElementById('menu2_' + i).innerHTML = '';
                }
            }

        });


        function addLeadingZero(num) {
            if (num < 10) {
                return "0" + num;
            } else {
                return "" + num;
            }
        }

        $(".responsive-calendar").responsiveCalendar({
            //time: '2017-03',
            events: {},
            onDayClick: function (events) {

                var key_tarih, liste_tarih;
                key_tarih = $(this).data('year') + '-' + addLeadingZero($(this).data('month')) + '-' + addLeadingZero($(this).data('day'));
                liste_tarih = addLeadingZero($(this).data('day')) + '-' + addLeadingZero($(this).data('month')) + '-' + $(this).data('year');

                $.post('https://yemekhane.iste.edu.tr/menuGetir', {
                    "tarih": key_tarih,
                    "_token": 'IStJfH02JuBRjH7t8jgKNSol6Aq7w1L54Kjva5Qb'
                }, function (data) {
                    document.getElementById('tarih').innerHTML = liste_tarih;
                    //alert(data);
                    var gelen = data + '';
                    var menuler = gelen.split("<-->");
                    if (menuler.length > 1) {
                        var menuarray1 = JSON.parse(menuler[0]) + '';
                        var menu1 = menuarray1.split(",");
                        //alert(menu1);
                        document.getElementById("menu1ID").classList.add('menu-border-right');
                        document.getElementById('menu1_head').innerHTML = 'MENÜ-1';
                        for (var i = 0; i < menu1.length; i++) {
                            document.getElementById('menu1_' + (i + 1)).innerHTML = menu1[i];
                        }

                        var menuarray2 = JSON.parse(menuler[1]) + '';
                        document.getElementById('menu2_head').innerHTML = 'MENÜ-2';
                        var menu2 = menuarray2.split(",");
                        for (var i = 0; i < menu2.length; i++) {
                            document.getElementById('menu2_' + (i + 1)).innerHTML = menu2[i];
                        }
                    } else {
                        document.getElementById("menu1ID").classList.remove('menu-border-right');
                        document.getElementById('menu1_head').innerHTML = '';
                        for (var i = 1; i <= 7; i++) {
                            document.getElementById('menu1_' + i).innerHTML = '';
                        }
                        document.getElementById('menu2_head').innerHTML = '';
                        for (var i = 1; i <= 7; i++) {
                            document.getElementById('menu2_' + i).innerHTML = '';
                        }
                    }

                });
            }
        });
    });
</script>
